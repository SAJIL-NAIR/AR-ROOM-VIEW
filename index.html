<script>
  const rig = document.querySelector("#cameraRig");
  const camera = document.querySelector("#camera");
  const roomModel = document.querySelector("#roomModel");

  const moveSpeed = 0.03;
  const rotateSpeed = 0.015;

  const keys = {};
  let collidableObjects = [];

  let moveForwardFlag = false;
  let moveBackwardFlag = false;
  let rotateLeftFlag = false;
  let rotateRightFlag = false;

  roomModel.addEventListener("model-loaded", function () {
    roomModel.object3D.traverse(function (child) {
      if (child.isMesh) {
        collidableObjects.push(child);
      }
    });
  });

  document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
  document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

  function getForwardDirection() {
    const direction = new THREE.Vector3();
    camera.object3D.getWorldDirection(direction);
    direction.y = 0;
    direction.normalize();
    return direction;
  }

  function canMove(direction) {
    const origin = new THREE.Vector3();
    rig.object3D.getWorldPosition(origin);
    origin.y = 1.0;

    const raycaster = new THREE.Raycaster(origin, direction, 0, 0.6);
    const hits = raycaster.intersectObjects(collidableObjects, true);

    return hits.length === 0;
  }

  function moveForward() {
    const direction = getForwardDirection();

    if (canMove(direction)) {
      rig.object3D.position.x += direction.x * moveSpeed;
      rig.object3D.position.z += direction.z * moveSpeed;
    }
  }

  function moveBackward() {
    const direction = getForwardDirection().negate();

    if (canMove(direction)) {
      rig.object3D.position.x += direction.x * moveSpeed;
      rig.object3D.position.z += direction.z * moveSpeed;
    }
  }

  function rotateLeft() {
    rig.object3D.rotation.y += rotateSpeed;
  }

  function rotateRight() {
    rig.object3D.rotation.y -= rotateSpeed;
  }

  function updateMovement() {
    if (keys["w"] || moveForwardFlag) moveForward();
    if (keys["s"] || moveBackwardFlag) moveBackward();
    if (keys["a"] || rotateLeftFlag) rotateLeft();
    if (keys["d"] || rotateRightFlag) rotateRight();

    requestAnimationFrame(updateMovement);
  }

  updateMovement();

  const joystick = nipplejs.create({
    zone: document.getElementById("joystick"),
    mode: "static",
    position: { left: "60px", top: "60px" },
    color: "white",
    size: 120
  });

  joystick.on("move", function (evt, data) {
    if (!data || !data.vector) return;

    moveForwardFlag = false;
    moveBackwardFlag = false;
    rotateLeftFlag = false;
    rotateRightFlag = false;

    const x = data.vector.x;
    const y = data.vector.y;

    if (Math.abs(y) > Math.abs(x)) {
      if (y > 0) {
        moveForwardFlag = true;
      } else {
        moveBackwardFlag = true;
      }
    } else {
      if (x < 0) {
        rotateLeftFlag = true;
      } else {
        rotateRightFlag = true;
      }
    }
  });

  joystick.on("end", function () {
    moveForwardFlag = false;
    moveBackwardFlag = false;
    rotateLeftFlag = false;
    rotateRightFlag = false;
  });
</script>
