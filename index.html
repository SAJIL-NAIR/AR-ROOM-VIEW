<!DOCTYPE html>

<html>
<head>
  <meta charset="utf-8">
  <title>360 Room View</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <a-scene background="color: #222">

```
<!-- Load model -->
<a-assets timeout="60000">
  <a-asset-item id="room" src="./the_morning_room.glb"></a-asset-item>
</a-assets>

<!-- Room Model -->
<a-entity
  gltf-model="#room"
  position="0 0 0"
  scale="1 1 1">
</a-entity>

<!-- Lights -->
<a-entity light="type: ambient; intensity: 1.5"></a-entity>
<a-entity light="type: directional; intensity: 1" position="2 4 3"></a-entity>

<!-- Camera INSIDE room (adjust X/Z if needed) -->
<a-entity
  camera
  look-controls
  position="0 1.6 -2">
</a-entity>
```

  </a-scene>
</body>
</html>
